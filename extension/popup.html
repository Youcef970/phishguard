<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishGuard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0B0E14;
      color: #E8EAED;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1E2430;
      margin-bottom: 16px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: #161B26;
      border: 1px solid #2A3140;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FFB627;
      font-weight: bold;
      font-size: 18px;
    }

    .header-text {
      flex: 1;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .header-text span {
      font-size: 11px;
      color: #6B7280;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.online { background: #3FB950; }
    .status-dot.offline { background: #E5484D; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-item {
      background: #161B26;
      border: 1px solid #1E2430;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-item .number {
      font-size: 17px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .stat-item .label {
      font-size: 10px;
      color: #6B7280;
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-card {
      background: #161B26;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #1E2430;
    }

    .status-card .title {
      font-size: 11px;
      color: #6B7280;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .verdict {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .verdict-icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .verdict-icon.safe { background: rgba(63,185,80,0.12); }
    .verdict-icon.suspicious { background: rgba(255,182,39,0.12); }
    .verdict-icon.phishing { background: rgba(229,72,77,0.12); }
    .verdict-icon.error { background: rgba(107,114,128,0.12); }

    .verdict-text { flex: 1; }
    .verdict-text .status { font-size: 14px; font-weight: 600; }
    .verdict-text .status.safe { color: #3FB950; }
    .verdict-text .status.suspicious { color: #FFB627; }
    .verdict-text .status.phishing { color: #E5484D; }
    .verdict-text .status.error { color: #6B7280; }
    .verdict-text .score { font-size: 11px; color: #6B7280; margin-top: 2px; }

    .flags-section { margin-bottom: 16px; }

    .flags-section .label {
      font-size: 11px;
      color: #6B7280;
      font-weight: 500;
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .flags { display: flex; flex-wrap: wrap; gap: 4px; }

    .flag {
      background: #1E2430;
      color: #9AA1B0;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #2A3140;
      font-family: 'JetBrains Mono', monospace;
    }

    .flag.flag-danger { background: rgba(229,72,77,0.1); color: #E5484D; border-color: rgba(229,72,77,0.3); }
    .flag.flag-warning { background: rgba(255,182,39,0.1); color: #FFB627; border-color: rgba(255,182,39,0.3); }

    .actions { display: flex; gap: 8px; margin-top: 8px; }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: #FFB627; color: #0B0E14; }
    .btn-primary:hover { background: #ffc454; }
    .btn-secondary { background: #1E2430; color: #C7CCD6; }
    .btn-secondary:hover { background: #2A3140; }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #1E2430;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer .version { font-size: 11px; color: #4B5563; font-family: 'JetBrains Mono', monospace; }
    .footer .links { display: flex; gap: 12px; }
    .footer .links a { font-size: 11px; color: #6B7280; text-decoration: none; }
    .footer .links a:hover { color: #FFB627; }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      color: #6B7280;
      font-size: 13px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #2A3140;
      border-top: 2px solid #FFB627;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">◆</div>
    <div class="header-text">
      <h1>PHISHGUARD</h1>
      <span>
        <span class="status-dot online" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
      </span>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item">
      <div class="number" id="totalScans">0</div>
      <div class="label">Scans</div>
    </div>
    <div class="stat-item">
      <div class="number" id="threatsFound">0</div>
      <div class="label">Threats</div>
    </div>
    <div class="stat-item">
      <div class="number" id="protectionRate">0%</div>
      <div class="label">Flagged</div>
    </div>
  </div>

  <div class="status-card">
    <div class="title">Current page</div>
    <div id="statusContent">
      <div class="loading">
        <div class="spinner"></div>
        <span>Analyzing…</span>
      </div>
    </div>
  </div>

  <div class="flags-section">
    <span class="label">Detected indicators</span>
    <div class="flags" id="flagsContainer">
      <span class="flag">No threats detected</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="scanBtn">Scan now</button>
    <button class="btn btn-secondary" id="settingsBtn">Settings</button>
  </div>

  <div class="footer">
    <span class="version">v1.0.0</span>
    <div class="links">
      <a href="#" id="reportLink">Report</a>
      <a href="#" id="dashboardLink">Dashboard</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
